<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WePa Baumaschinen- und Anhängerverleih</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:       #111111;
      --surface:  #1c1c1c;
      --surface2: #252525;
      --border:   #2e2e2e;
      --border2:  #3a3a3a;
      --red:      #c0282a;
      --text:     #e8e8e8;
      --muted:    #888;
      --subtle:   #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      max-width: 560px;
      width: 100%;
      text-align: center;
      overflow: hidden;
    }

    /* Red top stripe */
    .top-stripe {
      height: 3px;
      background: var(--red);
    }

    .inner {
      padding: 2.75rem 2.5rem 2.5rem;
    }

    /* Wordmark */
    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 13vw, 5.5rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--text);
    }

    /* Subtitle band */
    .subtitle-band {
      background: var(--surface2);
      border-top: 2px solid var(--red);
      border-bottom: 2px solid var(--red);
      padding: 0.55em 1em;
      margin: 0.75rem 0 2rem;
      font-size: clamp(0.72rem, 2.5vw, 0.85rem);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* Badge */
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border2);
      padding: 0.3em 0.85em;
      margin-bottom: 1.5rem;
    }

    .message {
      font-size: 0.95rem;
      color: #aaa;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    /* CTA */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--red);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      padding: 0.85em 2em;
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }
    .btn:active {
      opacity: 1;
      transform: none;
    }

    /* Contact */
    .contact {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 2.1;
    }
    .contact a {
      color: var(--muted);
      text-decoration: none;
    }
    .contact a:hover {
      color: var(--text);
    }

    /* Bottom stripe */
    .bottom-stripe {
      height: 2px;
      background: var(--border);
    }

    footer {
      margin-top: 1.75rem;
      font-size: 0.72rem;
      color: var(--subtle);
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      .inner { padding: 2rem 1.25rem 1.75rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn { transition: none; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="top-stripe"></div>
    <div class="inner">

      <div class="wordmark">WePa</div>

      <div class="subtitle-band">Baumaschinen- und Anhängerverleih</div>

      <div class="badge">Website im Aufbau</div>

      <p class="message">
        Unsere Website wird gerade neu aufgebaut.<br>
        In der Zwischenzeit finden Sie unser<br>
        gesamtes Angebot auf eBay Kleinanzeigen.
      </p>

      <a
        class="btn"
        href="https://www.kleinanzeigen.de/pro/wepa-maschinenverleih"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Zum Angebot auf eBay
      </a>

      <div class="contact">
        <a href="tel:+491623348413">Tel: 0162 3348413</a><br>
        Hinterdorfstr. 12a · 79367 Weisweil
      </div>

    </div>
    <div class="bottom-stripe"></div>
  </div>

  <footer>© 2026 WePa Baumaschinen- und Anhängerverleih</footer>

</body>
</html>
