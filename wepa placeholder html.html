<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WePa Maschinen & Anhängerverleih</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #e8a400;
      --text:      #f0ede8;
      --muted:     #888;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      max-width: 560px;
      width: 100%;
      padding: 3rem 2.5rem 2.5rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 2px;
      padding: 0.3em 0.75em;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.6rem, 9vw, 4.2rem);
      letter-spacing: 0.03em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    h1 span {
      color: var(--accent);
    }

    .sub {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 2rem;
    }

    .message {
      font-size: 1rem;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #0e0e0e;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      padding: 0.85em 2em;
      border-radius: 3px;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
      opacity: 1;
    }

    .btn svg {
      flex-shrink: 0;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2.25rem 1.5rem 2rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn {
        transition: none;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">Wir sind gleich zurück</div>

    <h1>WePa<br><span>Maschinen &</span><br>Anhängerverleih</h1>

    <div class="divider"></div>

    <p class="message">
      Unsere Website wird gerade neu aufgebaut.<br>
      In der Zwischenzeit finden Sie unser Angebot direkt auf eBay Kleinanzeigen.
    </p>

    <a
      class="btn"
      href="https://www.kleinanzeigen.de"
      target="_blank"
      rel="noopener noreferrer"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Zum Angebot auf eBay
    </a>
  </div>

  <footer>© 2025 WePa Maschinen & Anhängerverleih</footer>

</body>
</html>
